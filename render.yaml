services:
  - type: web
    name: sweetbake
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # Set this manually in Render dashboard from Aiven
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_NAME
        value: SweetBake
